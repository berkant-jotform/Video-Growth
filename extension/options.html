<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>YouTube A/B Tests Connector Settings</title>
    <link rel="stylesheet" href="extension.css" />
  </head>
  <body>
    <main class="panel">
      <h1>YouTube A/B Tests Connector</h1>
      <p>Connect this Chrome profile to the cloud detector. The extension only reads visible YouTube Studio notification text.</p>
      <label>
        Cloud app URL
        <input id="appUrl" placeholder="https://video-growth.vercel.app" />
      </label>
      <label>
        Connector token
        <input id="connectorToken" type="password" />
      </label>
      <label>
        Reviewer initials
        <input id="actorName" placeholder="BG" />
      </label>
      <label>
        Monitored channels
        <textarea id="channels" rows="4">Jotform, AI Agents Podcast, AI Agents</textarea>
      </label>
      <div class="actions">
        <button id="save">Save</button>
        <button id="heartbeat" type="button">Send heartbeat</button>
      </div>
      <p id="status" class="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
