<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>YouTube A/B Tests Connector</title>
    <link rel="stylesheet" href="extension.css" />
  </head>
  <body class="popup">
    <main class="panel compact">
      <div class="title-row">
        <h1>Studio Connector</h1>
        <span id="versionBadge" class="version-badge">v...</span>
      </div>
      <p id="summary">Checking status...</p>
      <section class="watcher-menu">
        <div class="menu-title">
          <strong>Watcher Studio channels</strong>
          <span id="watcherCount">Loading...</span>
        </div>
        <div id="watcherButtons" class="watcher-buttons"></div>
      </section>
      <div class="actions stacked">
        <button id="openWatchers">Open all watcher tabs</button>
        <button id="scan">Scan Studio tab</button>
        <button id="heartbeat">Send heartbeat</button>
        <button id="options">Settings</button>
      </div>
      <p class="hint">Passive checks run around the start of each hour. Keep watcher tabs open.</p>
      <dl>
        <div>
          <dt>Last heartbeat</dt>
          <dd id="lastHeartbeat">Never</dd>
        </div>
        <div>
          <dt>Last event post</dt>
          <dd id="lastEvent">Never</dd>
        </div>
      </dl>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
